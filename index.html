        function renderImageIndicators() {
            const row = document.querySelector('.image-row');
            const holder = document.querySelector('.img-indicators');
            if (!row || !holder) return;
            const images = row.querySelectorAll('.image-container');
            const total = images.length;
            const maxDots = 12;
            holder.innerHTML = '';
            const visible = Math.min(total, maxDots);
            for (let i = 0; i < visible; i++) {
                const c = images[i];
                const dot = document.createElement('div');
                dot.className = 'img-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => {
                    const left = c.offsetLeft - row.offsetLeft;
                    row.scrollTo({ left, behavior: 'smooth' });
                };
                holder.appendChild(dot);
            }
            if (total > maxDots) {
                const count = document.createElement('div');
                count.className = 'img-count';
                count.textContent = `1 / ${total}`;
                holder.appendChild(count);
            }
            setTimeout(updateImageIndicators, 40);
        }

        function updateImageIndicators() {
            const row = document.querySelector('.image-row');
            const dots = document.querySelectorAll('.img-dot');
            if (!row || dots.length === 0) return;
            const width = row.offsetWidth || 1;
            const activeIndex = Math.round(row.scrollLeft / width);
            dots.forEach((d, i) => d.classList.toggle('active', i === activeIndex));
            const count = document.querySelector('.img-count');
            if (count) {
                const total = row.querySelectorAll('.image-container').length;
                count.textContent = `${Math.min(activeIndex + 1, total)} / ${total}`;
            }
        }

        function imgNext() {
            const row = document.querySelector('.image-row');
            if (!row) return;
            const width = row.offsetWidth || 1;
            row.scrollTo({ left: row.scrollLeft + width, behavior: 'smooth' });
        }

        function imgPrev() {
            const row = document.querySelector('.image-row');
            if (!row) return;
            const width = row.offsetWidth || 1;
            row.scrollTo({ left: Math.max(0, row.scrollLeft - width), behavior: 'smooth' });
        }

        function deleteImage(btn) {
            const container = btn.closest('.image-container');
            if (!container) return;
            if (!confirm("Delete this image?")) return;
            container.remove();
            renderImageIndicators();
            saveServer();
        }

        let imageSelectMode = false;
        let lastImageSelectIndex = -1;
        let imageAutoPlay = false;
        let imageAutoTimer = null;
        let localAutoPlay = true;

        function ensureImageSelectionUI(row) {
            if (!row) return;
            row.querySelectorAll('.image-container').forEach(c => {
                if (!c.querySelector('.image-select')) {
                    const label = document.createElement('label');
                    label.className = 'image-select';
                    label.innerHTML = `<input type="checkbox" class="image-check"> Select`;
                    c.insertBefore(label, c.firstChild);
                    const checkbox = label.querySelector('input');
                    checkbox.addEventListener('change', () => {
                        c.classList.toggle('selected', checkbox.checked);
                    });
                    checkbox.addEventListener('click', (e) => {
                        if (!e.shiftKey) {
                            lastImageSelectIndex = getImageIndex(c);
                            return;
                        }
                        const rowEl = c.closest('.image-row');
                        if (!rowEl) return;
                        const containers = Array.from(rowEl.querySelectorAll('.image-container'));
                        const currentIndex = containers.indexOf(c);
                        if (lastImageSelectIndex < 0) {
                            lastImageSelectIndex = currentIndex;
                            return;
                        }
                        const [start, end] = lastImageSelectIndex < currentIndex
                            ? [lastImageSelectIndex, currentIndex]
                            : [currentIndex, lastImageSelectIndex];
                        for (let i = start; i <= end; i++) {
                            const target = containers[i];
                            const cb = target.querySelector('.image-check');
                            if (cb) {
                                cb.checked = true;
                                cb.dispatchEvent(new Event('change'));
                            }
                        }
                    });
                }
            });
        }

        function getImageIndex(container) {
            const row = container.closest('.image-row');
            if (!row) return -1;
            const containers = Array.from(row.querySelectorAll('.image-container'));
            return containers.indexOf(container);
        }

        function toggleImageSelectMode() {
            const row = document.querySelector('.image-row');
            if (!row) return;
            imageSelectMode = !imageSelectMode;
            row.classList.toggle('select-mode', imageSelectMode);
            ensureImageSelectionUI(row);
            if (!imageSelectMode) {
                lastImageSelectIndex = -1;
            }
        }

        function selectAllImages() {
            const row = document.querySelector('.image-row');
            if (!row) return;
            ensureImageSelectionUI(row);
            row.classList.add('select-mode');
            imageSelectMode = true;
            row.querySelectorAll('.image-check').forEach(cb => {
                cb.checked = true;
                cb.dispatchEvent(new Event('change'));
            });
        }

        function invertImageSelection() {
            const row = document.querySelector('.image-row');
            if (!row) return;
            ensureImageSelectionUI(row);
            row.classList.add('select-mode');
            imageSelectMode = true;
            row.querySelectorAll('.image-check').forEach(cb => {
                cb.checked = !cb.checked;
                cb.dispatchEvent(new Event('change'));
            });
        }

        function deleteSelectedImages() {
            const row = document.querySelector('.image-row');
            if (!row) return;
            ensureImageSelectionUI(row);
            const selected = row.querySelectorAll('.image-container.selected');
            if (selected.length === 0) {
                status.textContent = "No images selected";
                setTimeout(() => status.textContent = "Ready", 1200);
                return;
            }
            if (!confirm(`Delete ${selected.length} selected image(s)?`)) return;
            selected.forEach(c => c.remove());
            renderImageIndicators();
            saveServer();

        function deleteAllImages() {
            const row = document.querySelector('.image-row');
            if (!row) return;
            const all = row.querySelectorAll('.image-container');
            if (all.length === 0) return;
            if (!confirm(`Delete ALL ${all.length} images?`)) return;
            all.forEach(c => c.remove());
            renderImageIndicators();
            saveServer();

        function toggleImageAutoPlay(btn) {
            const row = document.querySelector('.image-row');
            if (!row) return;
            imageAutoPlay = !imageAutoPlay;
            if (imageAutoPlay) {
                if (btn) btn.textContent = "Stop Auto Play";
                imageAutoTimer = setInterval(() => {
                    const width = row.offsetWidth || 1;
                    row.scrollTo({ left: row.scrollLeft + width, behavior: 'smooth' });
                }, 3000);
            } else {
                if (btn) btn.textContent = "Auto Play";
                if (imageAutoTimer) clearInterval(imageAutoTimer);
                imageAutoTimer = null;
            }
            updateImageAutoPlayUI();

        function updateImageAutoPlayUI() {
            const iconBtn = document.getElementById('imageAutoBtn');
            if (iconBtn) {
                iconBtn.classList.toggle('is-active', imageAutoPlay);
                iconBtn.innerHTML = imageAutoPlay
                    ? '<i data-lucide="pause"></i>'
                    : '<i data-lucide="play"></i>';
            }
            document.querySelectorAll('.img-menu button').forEach(b => {
                if (b.textContent?.includes('Auto Play')) {
                    b.textContent = imageAutoPlay ? 'Stop Auto Play' : 'Auto Play';
                }

        function toggleImageMenu(btn) {
            const menu = btn?.parentElement?.querySelector('.img-menu');
            if (!menu) return;
            const isOpen = menu.classList.toggle('open');
            document.querySelectorAll('.img-menu').forEach(m => {
                if (m !== menu) m.classList.remove('open');
            });
            if (isOpen) {
                const onBody = (e) => {
                    if (!menu.contains(e.target) && e.target !== btn) {
                        menu.classList.remove('open');
                        document.removeEventListener('click', onBody);
                    }
                };
                setTimeout(() => document.addEventListener('click', onBody), 0);

        function downloadAllImages() {
            const row = document.querySelector('.image-row');
            if (!row) return;
            const imgs = row.querySelectorAll('img');
            if (imgs.length === 0) return;
            if (!confirm(`Download ALL ${imgs.length} images?`)) return;
            const list = Array.from(imgs)
                .map(img => img.getAttribute('src'))
                .filter(Boolean)
                .map(url => url.split('/').pop()?.split('?')[0])
                .filter(Boolean);

            fetch("/download_images", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ files: list })
            }).then(res => {
                if (!res.ok) throw new Error("Download failed");
                return res.blob();
            }).then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'images.zip';
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            }).catch(() => {
                alert("Could not create zip. Try again.");
            });
        }

        async function uploadImagesInBatches(files, batchSize = 25) {
            if (!files || files.length === 0) return;
            const total = files.length;
            let done = 0;

            for (let i = 0; i < files.length; i += batchSize) {
                const batch = files.slice(i, i + batchSize);
                for (const file of batch) {
                    await uploadSingleImage(file, () => {
                        done += 1;
                        status.textContent = `Uploading images ${done}/${total}`;
                    });
                }
            }

            status.textContent = "Ready";
            setTimeout(() => status.textContent = "Ready", 2000);
        }

        function uploadSingleImage(file, onDone) {
            return new Promise(resolve => {
                const container = getOrCreateImageCarousel();
                const row = container.querySelector('.image-row');
                const id = `img:${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
                const placeholderHtml = `
                    <div class="image-container" data-image-id="${id}">
                        <label class="image-select"><input type="checkbox" class="image-check"> Select</label>
                        <button class="image-delete" onclick="deleteImage(this)">✕</button>
                        <div class="image-card"></div>
                        <div class="image-upload-progress">
                            <div class="upload-bar"></div>
                            <div class="upload-text">0 MB / 0 MB</div>
                        </div>
                    </div>
                `;
                row.insertAdjacentHTML('beforeend', placeholderHtml);
                renderImageIndicators();

                const placeholder = row.querySelector(`.image-container[data-image-id="${id}"]`);
                const bar = placeholder ? placeholder.querySelector('.upload-bar') : null;
                const label = placeholder ? placeholder.querySelector('.upload-text') : null;
                if (placeholder) {
                    const cb = placeholder.querySelector('.image-check');
                    if (cb) {
                        cb.addEventListener('change', () => {
                            placeholder.classList.toggle('selected', cb.checked);
                        });
                        cb.addEventListener('click', (e) => {
                            if (!e.shiftKey) {
                                lastImageSelectIndex = getImageIndex(placeholder);
                                return;
                            }
                            const rowEl = placeholder.closest('.image-row');
                            if (!rowEl) return;
                            const containers = Array.from(rowEl.querySelectorAll('.image-container'));
                            const currentIndex = containers.indexOf(placeholder);
                            if (lastImageSelectIndex < 0) {
                                lastImageSelectIndex = currentIndex;
                                return;
                            }
                            const [start, end] = lastImageSelectIndex < currentIndex
                                ? [lastImageSelectIndex, currentIndex]
                                : [currentIndex, lastImageSelectIndex];
                            for (let i = start; i <= end; i++) {
                                const target = containers[i];
                                const cbox = target.querySelector('.image-check');
                                if (cbox) {
                                    cbox.checked = true;
                                    cbox.dispatchEvent(new Event('change'));
                                }
                            }
                        });
                    }
                }

                const formData = new FormData();
                formData.append("image", file);

                const xhr = new XMLHttpRequest();
                xhr.open("POST", "/upload_image", true);
                xhr.upload.onprogress = function (evt) {
                    if ((!bar && !label) || !evt.lengthComputable) return;
                    const pct = Math.round((evt.loaded / evt.total) * 100);
                    if (bar) bar.style.width = pct + '%';
                    if (label) {
                        label.textContent = `${formatBytes(evt.loaded)} / ${formatBytes(evt.total)}`;
                    }
                };
                xhr.onload = function () {
                    if (!placeholder) {
                        resolve();
                        return;
                    }
                    if (xhr.status >= 200 && xhr.status < 300) {
                        let data = null;
                        try { data = JSON.parse(xhr.responseText); } catch (e) { }
                        const url = data && data.url ? data.url : null;
                        if (!url) {
                            placeholder.remove();
                            resolve();
                            if (onDone) onDone();
                            return;
                        }
                        placeholder.querySelector('.image-card').innerHTML = `<img src="${url}" alt="Image" />`;
                        const prog = placeholder.querySelector('.image-upload-progress');
                        if (prog) prog.remove();
                        renderImageIndicators();
                        saveServer();
                        if (onDone) onDone();
                        resolve();
                    } else {
                        placeholder.remove();
                        if (onDone) onDone();
                        resolve();
                    }
                };
                xhr.onerror = function () {
                    if (placeholder) placeholder.remove();
                    if (onDone) onDone();
                    resolve();
                };
                xhr.send(formData);
            });
        }

        function getOrCreateVideoGrid() {
            let grid = paper.querySelector('.video-grid');
            if (!grid) {
                grid = document.createElement('div');
                grid.className = 'video-grid';
                paper.appendChild(grid);
            }
            return grid;
        }

        // YouTube JS API variables and functions
        let ytPlayers = [];

        function initYouTubePlayers() {
            ytPlayers = [];
            document.querySelectorAll('.video-container iframe').forEach((iframe) => {
                try {
                    const player = new YT.Player(iframe, {
                        events: {
                            onStateChange: onPlayerStateChange,
                            onError: onPlayerError
                        }
                    });
                    // Store the iframe element on the player object for easy reference if needed
                    player.getIframe().dataset.playerId = ytPlayers.length;
                    ytPlayers.push(player);
                } catch (e) {
                    console.warn("YouTube API not ready or error init player", e);
                }
            });
        }

        function playNextVideo(currentPlayer) {
            const currentIndex = ytPlayers.indexOf(currentPlayer);
            if (currentIndex !== -1 && currentIndex < ytPlayers.length - 1) {
                const nextPlayer = ytPlayers[currentIndex + 1];
                try {
                    // Scroll the carousel so the next video is visible
                    const row = document.querySelector('.video-row');
                    const containers = row ? row.querySelectorAll('.video-container') : null;
                    const nextContainer = containers ? containers[currentIndex + 1] : null;
                    if (nextContainer && row) {
                        const left = nextContainer.offsetLeft - row.offsetLeft;
                        row.scrollTo({ left: left, behavior: 'smooth' });
                        // ensure indicators update after scroll starts
                        setTimeout(updateIndicators, 250);
                    }

                    // Play the next video (audio + video will start in that iframe)
                    nextPlayer.playVideo();
                } catch (e) {
                    console.error("Error playing next video", e);
                    // If next video fails immediately, try the one after
                    try { playNextVideo(nextPlayer); } catch (_) { }
                }
            }
        }

        function onPlayerStateChange(event) {
            // Auto-pause others when one plays
            const playBtn = document.querySelector('.video-controls .play-btn');

            if (event.data === YT.PlayerState.PLAYING) {
                try {
                    const iframe = event.target.getIframe?.();
                    const container = iframe ? iframe.closest('.video-container') : null;
                    if (container) {
                        _activeContainer = container;
                        _activeVideoId = container.dataset.videoId || _activeVideoId;
                        const row = document.querySelector('.video-row');
                        if (row) {
                            const containers = row.querySelectorAll('.video-container');
                            _lastActiveIndex = Array.from(containers).indexOf(container);
                        }
                    }
                } catch (e) { }
                if (playBtn) {
                    playBtn.innerHTML = '<i data-lucide="pause"></i>';
                    lucide.createIcons();
                }
                ytPlayers.forEach(p => {
                    if (p !== event.target) {
                        try {
                            p.pauseVideo();
                        } catch (e) { }
                    }
                });
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                // If it's the active one (closest to center), update icon
                const isAnyPlaying = ytPlayers.some(p => {
                    try { return p.getPlayerState() === YT.PlayerState.PLAYING; } catch (e) { return false; }
                });
                if (!isAnyPlaying && playBtn) {
                    playBtn.innerHTML = '<i data-lucide="play"></i>';
                    lucide.createIcons();
                }
            }

            // Playlist logic: Play next when ended
            if (event.data === YT.PlayerState.ENDED) {
                playNextVideo(event.target);
            }
        }

        function onPlayerError(event) {
            console.warn("Video error encountered, skipping...", event.data);
            // Error codes: 100, 101, 150 mean video unavailable/restricted. 
            // We skip to next video on any error to keep playlist going.
            playNextVideo(event.target);
        }

        // Pill progress updater
        let _pillInterval = null;
        let _localPillInterval = null;

        function updatePillProgress(container, rowSelector, containerSelector) {
            if (!container) return;

            const row = container.querySelector(rowSelector);
            if (!row) return;

            const scrollLeft = row.scrollLeft;
            const width = row.offsetWidth || 1;
            const activeIndex = Math.round(scrollLeft / width);

            const progressFill = container.querySelector('.video-progress-fill');
            if (!progressFill) return;

            const containers = row.querySelectorAll(containerSelector);
            const activeContainer = containers[activeIndex] || null;

            if (!activeContainer) {
                progressFill.style.width = '0%';
                return;
            }

            // 🔵 LOCAL VIDEO
            const localVideo = activeContainer.querySelector('video');
            if (localVideo) {
                const dur = localVideo.duration || 0;
                const cur = localVideo.currentTime || 0;
                const pct = dur > 0 ? (cur / dur) * 100 : 0;
                progressFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
                return;
            }

            // 🔴 YOUTUBE
            if (typeof ytPlayers !== "undefined" && ytPlayers[activeIndex]) {
                try {
                    const player = ytPlayers[activeIndex];
                    const dur = player.getDuration();
                    const cur = player.getCurrentTime();
                    const pct = dur > 0 ? (cur / dur) * 100 : 0;
                    progressFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
                } catch (e) {
                    progressFill.style.width = '0%';
                }
                return;
            }

            progressFill.style.width = '0%';
        }
        const ytContainer = document.querySelector('.video-carousel-container');

        updatePillProgress(
            ytContainer,
            '.video-row',
            '.video-container'
        );
        const localContainer = document.querySelector('.local-video-carousel-container');

        updatePillProgress(
            localContainer,
            '.local-video-row',
            '.video-container'
        );

        function startPillUpdater(container) {
            const target = container || document.querySelector('.video-carousel-container');
            if (!target) return;
            if (_pillInterval) return;
            _pillInterval = setInterval(() => {
                updatePillProgress(target, '.video-row', '.video-container');
            }, 250);
        }

        function initYouTubeSection() {
            const ytContainer = document.querySelector('.video-carousel-container');
            if (!ytContainer) return;

            renderIndicators(ytContainer, '.video-row');
            initYouTubePlayers?.();
        }

        function initLocalVideoSection() {
            const localContainer = document.querySelector('.local-video-carousel-container');
            if (!localContainer) return;

            renderLocalIndicators();
            startLocalPillUpdater();
        }
        function stopPillUpdater() {
            if (_pillInterval) {
                clearInterval(_pillInterval);
                _pillInterval = null;
            }
        }

        function startLocalPillUpdater() {
            if (_localPillInterval) return;
            _localPillInterval = setInterval(updateLocalPillProgress, 250);
        }

        function stopLocalPillUpdater() {
            if (_localPillInterval) {
                clearInterval(_localPillInterval);
                _localPillInterval = null;
            }
        }

        // Hook into player state changes to start/stop updater
        const _origOnPlayerStateChange = onPlayerStateChange;
        onPlayerStateChange = function (event) {
            _origOnPlayerStateChange(event);
            if (event.data === YT.PlayerState.PLAYING) {
                startPillUpdater();
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                // stop if nothing is playing
                const isAnyPlaying = ytPlayers.some(p => {
                    try { return p.getPlayerState() === YT.PlayerState.PLAYING; } catch (e) { return false; }
                });
                if (!isAnyPlaying) stopPillUpdater();
            }
        };

        // Seek by clicking on the active dot (which expands into a pill)
        document.addEventListener('click', (e) => {
            const progress = e.target.closest('.video-progress');
            if (progress) {
                const container = progress.closest('.video-carousel-container');
                if (!container) return;
                const rect = progress.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const pct = Math.max(0, Math.min(1, x / rect.width));
                const row = container.querySelector('.video-row');
                if (!row) return;
                const activeIndex = Math.round(row.scrollLeft / (row.offsetWidth || 1));
                if (typeof ytPlayers !== "undefined" && ytPlayers[activeIndex]) {
                    try {
                        const player = ytPlayers[activeIndex];
                        const dur = player.getDuration();
                        player.seekTo(pct * dur, true);
                        updatePillProgress(container, '.video-row', '.video-container');
                    } catch (err) { }
                }
                return;
            }

            const dot = e.target.closest('.dot');
            if (!dot || !dot.classList.contains('active')) return;

            const container = dot.closest(
                '.video-carousel-container, .local-video-carousel-container'
            );
            if (!container) return;

            const rect = dot.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const pct = Math.max(0, Math.min(1, x / rect.width));

            // Detect correct row type
            const row = container.querySelector('.video-row, .local-video-row');
            if (!row) return;

            const activeIndex = Math.round(
                row.scrollLeft / (row.offsetWidth || 1)
            );

            const containers = row.querySelectorAll('.video-container');
            const activeContainer = containers[activeIndex];
            if (!activeContainer) return;

            // 🔵 LOCAL VIDEO SEEK
            const localVideo = activeContainer.querySelector('video');
            if (localVideo && localVideo.duration) {
                localVideo.currentTime = pct * localVideo.duration;
                updatePillProgress(
                    container,
                    row.classList.contains('local-video-row')
                        ? '.local-video-row'
                        : '.video-row',
                    '.video-container'
                );
                return;
            }

            // 🔴 YOUTUBE SEEK
            if (typeof ytPlayers !== "undefined" && ytPlayers[activeIndex]) {
                try {
                    const player = ytPlayers[activeIndex];
                    const dur = player.getDuration();
                    player.seekTo(pct * dur, true);

                    updatePillProgress(
                        container,
                        '.video-row',
                        '.video-container'
                    );
                } catch (err) { }
            }
        });

        // Drag scrub on the active pill (YouTube-like)
        function scrubToPercent(container, pct) {
            if (!container) return;

            const row = container.querySelector('.video-row, .local-video-row');
            if (!row) return;

            const activeIndex = Math.round(
                row.scrollLeft / (row.offsetWidth || 1)
            );

            const containers = row.querySelectorAll('.video-container');
            const activeContainer = containers[activeIndex] || null;
            if (!activeContainer) return;

            // 🔵 LOCAL VIDEO
            const localVideo = activeContainer.querySelector('video');
            if (localVideo && localVideo.duration) {
                localVideo.currentTime = pct * localVideo.duration;

                updatePillProgress(
                    container,
                    row.classList.contains('local-video-row')
                        ? '.local-video-row'
                        : '.video-row',
                    '.video-container'
                );
                return;
            }

            // 🔴 YOUTUBE
            if (typeof ytPlayers !== "undefined" && ytPlayers[activeIndex]) {
                try {
                    const player = ytPlayers[activeIndex];
                    const dur = player.getDuration();
                    player.seekTo(pct * dur, true);

                    updatePillProgress(
                        container,
                        '.video-row',
                        '.video-container'
                    );
                } catch (e) { }
            }
        }

        function handleScrubEvent(e) {
            const dot = e.target.closest('.dot.active');
            if (!dot) return;
            const rect = dot.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            scrubToPercent(pct);
        }

        document.addEventListener('mousedown', (e) => {
            const dot = e.target.closest('.dot.active');
            if (!dot) return;
            const move = (ev) => handleScrubEvent(ev);
            const up = () => {
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', up);
            };
            handleScrubEvent(e);
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
        });

        document.addEventListener('touchstart', (e) => {
            const dot = e.target.closest('.dot.active');
            if (!dot) return;
            const move = (ev) => handleScrubEvent(ev);
            const up = () => {
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', up);
            };
            handleScrubEvent(e);
            document.addEventListener('touchmove', move, { passive: true });
            document.addEventListener('touchend', up);
        }, { passive: true });

        /* Carousel UI Helpers */
        function renderIndicators(container, rowSelector) {
            const carousel = container || document.querySelector('.video-carousel-container');
            if (!carousel) return;

            const row = carousel.querySelector(rowSelector || '.video-row');
            let indicatorBar = carousel.querySelector('.indicators') || carousel.querySelector('.indicator-bar');

            if (!indicatorBar) {
                indicatorBar = document.createElement('div');
                indicatorBar.className = 'indicator-bar';
                carousel.appendChild(indicatorBar);
            }

            indicatorBar.innerHTML = '';
            if (!row) return;

            const progress = document.createElement('div');
            progress.className = 'video-progress';
            const fill = document.createElement('div');
            fill.className = 'video-progress-fill';
            progress.appendChild(fill);
            indicatorBar.appendChild(progress);
        }

        let _lastActiveIndex = 0;
        let _activeContainer = null;
        let _activeVideoId = null;
        let _lockActive = false;
        let _snapBackup = null;

        function getActiveIndexByCenter(row) {
            const containers = row.querySelectorAll('.video-container');
            if (!containers || containers.length === 0) return 0;

            const rowRect = row.getBoundingClientRect();
            const rowCenter = rowRect.left + rowRect.width / 2;
            let bestIdx = 0;
            let bestDist = Infinity;

            containers.forEach((c, i) => {
                const rect = c.getBoundingClientRect();
                const center = rect.left + rect.width / 2;
                const dist = Math.abs(center - rowCenter);
                if (dist < bestDist) {
                    bestDist = dist;
                    bestIdx = i;
                }
            });

            return bestIdx;
        }

        function findContainerByVideoId(row, videoId) {
            if (!videoId) return null;
            return row.querySelector(`.video-container[data-video-id="${videoId}"]`);
        }

        function resolveActiveContainer(row) {
            if (_activeContainer && row.contains(_activeContainer)) return _activeContainer;
            const byId = findContainerByVideoId(row, _activeVideoId);
            if (byId) return byId;
            const idx = getActiveIndexByCenter(row);
            const containers = row.querySelectorAll('.video-container');
            return containers[idx] || null;
        }

        function rememberActiveIndex(container) {
            if (!container) return;

            const row = container.querySelector('.video-row, .local-video-row');
            if (!row) return;

            const containers = row.querySelectorAll('.video-container');
            if (!containers.length) return;

            const activeIndex = Math.round(
                row.scrollLeft / (row.offsetWidth || 1)
            );

            const activeContainer = containers[activeIndex] || null;

            // Store state per container
            container._activeContainer = activeContainer || null;
            container._lastActiveIndex = activeIndex;

            if (activeContainer) {
                container._activeVideoId =
                    activeContainer.dataset.videoId || null;
            }
        }
        rememberActiveIndex();


        function realignCarouselToActive() {
            const row = document.querySelector('.video-row');
            if (!row) return;
            const containers = row.querySelectorAll('.video-container');
            if (!containers || containers.length === 0) return;

            const clamped = Math.max(0, Math.min(_lastActiveIndex, containers.length - 1));
            const target = resolveActiveContainer(row) || containers[clamped];
            _activeContainer = target;
            _activeVideoId = target ? (target.dataset.videoId || _activeVideoId) : _activeVideoId;

            const rowRect = row.getBoundingClientRect();
            const targetRect = target.getBoundingClientRect();
            const rowCenter = rowRect.left + rowRect.width / 2;
            const targetCenter = targetRect.left + targetRect.width / 2;
            const delta = targetCenter - rowCenter;
            const nextLeft = row.scrollLeft + delta;

            row.scrollTo({ left: nextLeft, behavior: 'smooth' });
            updateIndicators();

            if (_snapBackup !== null) {
                row.style.scrollSnapType = _snapBackup;
                _snapBackup = null;
            }
            _lockActive = false;
        }

        function updateIndicators() {
            const carouselContainer = document.querySelector('.video-carousel-container');
            const row = carouselContainer ? carouselContainer.querySelector('.video-row') : document.querySelector('.video-row');
            if (!row) return;
            const progressFill = carouselContainer
                ? carouselContainer.querySelector('.video-progress-fill')
                : document.querySelector('.video-progress-fill');
            if (!progressFill) {
                renderIndicators(carouselContainer, '.video-row');
                return;
            }

            const containers = row.querySelectorAll('.video-container');
            let activeIndex = getActiveIndexByCenter(row);
            if (_lockActive) {
                const locked = resolveActiveContainer(row);
                if (locked) {
                    activeIndex = Array.from(containers).indexOf(locked);
                }
            } else {
                _activeContainer = containers[activeIndex] || null;
                _activeVideoId = _activeContainer ? (_activeContainer.dataset.videoId || _activeVideoId) : _activeVideoId;
            }
            _lastActiveIndex = Math.max(0, activeIndex);

            containers.forEach((c, i) => {
                c.classList.toggle('is-active', i === activeIndex);
            });

            // Update progress fill from player state
            updatePillProgress(carouselContainer, '.video-row', '.video-container');
        }

        function insertVideo() {
            let input = prompt("Paste YouTube URL (Video or Playlist):");
            if (!input) return;
            input = input.trim();

            // 1. Try to find a Video ID
            // Supports: youtube.com/watch?v=ID, youtu.be/ID, youtube.com/embed/ID, youtube.com/shorts/ID
            const videoMatch = input.match(
                /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/
            );

            // 2. Try to find a Playlist ID
            // Supports: ?list=ID, &list=ID
            const listMatch = input.match(/[?&]list=([a-zA-Z0-9_-]+)/);

            let embedUrl = null;

            if (videoMatch && listMatch) {
                // Video + Playlist (watch?v=...&list=...)
                embedUrl = `https://www.youtube.com/embed/${videoMatch[1]}?list=${listMatch[1]}&enablejsapi=1`;
            } else if (videoMatch) {
                // Single Video
                embedUrl = `https://www.youtube.com/embed/${videoMatch[1]}?enablejsapi=1`;
            } else if (listMatch) {
                // Playlist Only (playlist?list=...)
                embedUrl = `https://www.youtube.com/embed?listType=playlist&list=${listMatch[1]}&enablejsapi=1`;
            } else {
                // Fallback: Check if it's a raw playlist URL without 'watch' or 'embed' nicely formatted
                // e.g. youtube.com/playlist?list=ID
                if (input.includes("youtube.com") && listMatch) {
                    embedUrl = `https://www.youtube.com/embed?listType=playlist&list=${listMatch[1]}&enablejsapi=1`;
                } else {
                    alert("Only YouTube links are supported (Video or Playlist)");
                    return;
                }
            }

            const row = getOrCreateVideoCarousel();

            // Create the container
            // We use 'allow-popups' etc to ensure playlist UI works well
            const containerId = videoMatch ? `video:${videoMatch[1]}` : (listMatch ? `list:${listMatch[1]}` : `vid:${Date.now()}`);
            row.insertAdjacentHTML("beforeend", `
        <div class="video-container" data-video-id="${containerId}">
            <div class="video-card">
                <button class="video-delete" onclick="deleteVideo(this)">✕</button>
                <iframe src="${embedUrl}" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen></iframe>
            </div>
        </div>
    `);

            // Initialize the new player immediately if possible
            // Note: API might not pick it up until page reload unless we manually init
            // But our MutationObserver or initYouTubePlayers logic handles batch inits usually
            // Ideally we push to ytPlayers
            setTimeout(() => {
                const newIframe = row.lastElementChild.querySelector('iframe');
                try {
                    const idx = ytPlayers.length;
                    const player = new YT.Player(newIframe, {
                        events: {
                            onStateChange: onPlayerStateChange,
                            onError: onPlayerError
                        }
                    });
                    newIframe.dataset.playerId = idx;
                    ytPlayers.push(player);
                } catch (e) { }
            }, 1000);

            saveServer();
            renderIndicators(); // Refresh dots
            scheduleDeleteHide();
            status.textContent = "Video/Playlist added";
            setTimeout(() => status.textContent = "Ready", 2000);
        }

                        xhr.open("POST", `${UPLOAD_BASE}/upload_video`, true);
                        let _lastTime = Date.now();
                        let _lastLoaded = 0;

                        xhr.upload.onprogress = function (evt) {
                            if ((!bar && !label) || !evt.lengthComputable) return;
                            const pct = Math.round((evt.loaded / evt.total) * 100);
                            if (bar) bar.style.width = pct + '%';
                            if (label) {
                                const now = Date.now();
                                const dt = Math.max(1, now - _lastTime) / 1000;
                                const dBytes = Math.max(0, evt.loaded - _lastLoaded);
                                const speed = dBytes / dt;
                                const remaining = Math.max(0, evt.total - evt.loaded);
                                const eta = speed > 0 ? Math.ceil(remaining / speed) : 0;
                                label.textContent = `${formatBytes(evt.loaded)} / ${formatBytes(evt.total)} • ${formatBytes(speed)}/s • ${formatETA(eta)}`;
                                _lastTime = now;
                                _lastLoaded = evt.loaded;
                            }
                        };
                        xhr.onload = function () {
                            if (!placeholder) {
                                resolve();
                                return;
                            }
                            if (xhr.status >= 200 && xhr.status < 300) {
                                let data = null;
                                try { data = JSON.parse(xhr.responseText); } catch (e) { }
                                const url = data && data.url ? data.url : null;
                                if (!url) {
                                    placeholder.remove();
                                    resolve();
                                    return;

                                placeholder.querySelector('.video-card').innerHTML = `

                    <button class="video-audio-toggle" onclick="toggleLocalVideoAudio(this)"><i data-lucide="volume-2"></i></button>
                                    <video src="${url}" controls playsinline></video>

                                `;
                                const localVideo = placeholder.querySelector('video');
                                setupLocalVideoPreview(localVideo);
                                renderIndicators();
                                scheduleDeleteHide();
                                ensureVideoObserver();
                                saveServer();
                                resolve();
                            } else {
                                placeholder.remove();
                                resolve();
                            }
                        };
                        xhr.onerror = function () {
                            if (placeholder) placeholder.remove();
                            resolve();
                        };
                        xhr.send(formData);
                    });
                }
            }
            this.value = ""; // Reset
        });

        function formatBytes(bytes) {
            if (!bytes || bytes <= 0) return "0 MB";
            const units = ["B", "KB", "MB", "GB", "TB"];
            const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
            const val = bytes / Math.pow(1024, i);
            const digits = val >= 100 ? 0 : val >= 10 ? 1 : 2;
            return `${val.toFixed(digits)} ${units[i]}`;
        }

        function formatETA(seconds) {
            if (!seconds || seconds <= 0) return "0s";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            if (m <= 0) return `${s}s`;
            return `${m}m ${s}s`;
        }

        function parseTrackMetadata(filename) {
            let cleanName = filename || "";

            // Strip audio extension
            cleanName = cleanName.replace(/\.[^.]+$/i, '');

            // Remove common source-site tags that often appear in downloaded song names.
            cleanName = cleanName.replace(/(?:^|[\s._-]+)(?:sensongs(?:mp3)?(?:\.[a-z]{2,3})?|naasongs(?:mp3)?(?:\.[a-z]{2,3})?|isongs(?:info)?(?:\.[a-z]{2,3})?)(?=$|[\s._-]+)/gi, ' ');

            // Remove numeric prefixes and leftover separators from the start.
            cleanName = cleanName.replace(/^[\s._-]*\d+[\s._-]*/g, '');

            // Convert dots and underscores to spaces, collapse repeated whitespace
            cleanName = cleanName.replace(/[._]+/g, ' ');
            cleanName = cleanName.replace(/\s+/g, ' ');
            cleanName = cleanName.trim();

            let artist = "";
            let title = cleanName;

            // Split by dash to extract artist & title
            const dashIndex = cleanName.indexOf(" - ");
            if (dashIndex !== -1) {
                artist = cleanName.substring(0, dashIndex).trim();
                title = cleanName.substring(dashIndex + 3).trim();
            } else {
                const hyphenIndex = cleanName.indexOf("-");
                if (hyphenIndex !== -1) {
                    artist = cleanName.substring(0, hyphenIndex).trim();
                    title = cleanName.substring(hyphenIndex + 1).trim();
                }
            }

            // Clean up any remaining double spaces or edge spaces
            title = title.replace(/\s+/g, ' ').trim();
            artist = artist.replace(/\s+/g, ' ').trim();

            if (!artist) {
                artist = "Unknown Artist";
            }

            return {
                title: title,
                artist: artist
            };
        }

        function formatMusicFileName(filename) {
            const meta = parseTrackMetadata(filename);
            return meta.title;
        }

        function buildTrackFromPayload(payload) {
            const name = payload.name || payload.original_name || "Audio";
            const meta = parseTrackMetadata(name);
            return {
                id: payload.id,

                artist: payload.artist || meta.artist,
                size: Number(payload.size) || 0,
                url: payload.url,
                downloadUrl: payload.download_url || payload.downloadUrl || payload.url,
                status: "Ready",
                audio: null,

            };
        }

                hideMusicUploadModal();
            });
        }

        function showMusicUploadModal() {
            if (musicUploadState.hiddenByUser) return;
            document.getElementById("musicUploadModal")?.classList.add("show");
        }

        function hideMusicUploadModal() {
            document.getElementById("musicUploadModal")?.classList.remove("show");
        }

        function updateMusicUploadModal() {
            const fill = document.getElementById("musicUploadFill");
            const meta = document.getElementById("musicUploadMeta");
            const title = document.getElementById("musicUploadTitle");
            if (!fill || !meta || !title) return;
            const inFlightLoaded = Object.values(musicUploadState.inFlight).reduce((sum, n) => sum + (Number(n) || 0), 0);
            const uploaded = musicUploadState.completedBytes + inFlightLoaded;
            const total = Math.max(1, musicUploadState.totalBytes);
            const pct = Math.max(0, Math.min(100, Math.round((uploaded / total) * 100)));
            fill.style.width = `${pct}%`;
            title.textContent = musicState.uploading ? "Uploading music" : "Upload complete";
            meta.textContent = `${musicUploadState.completedFiles}/${musicUploadState.totalFiles} files • ${formatBytes(uploaded)} / ${formatBytes(musicUploadState.totalBytes)} • ${pct}%`;
        }

        function queueMusicUploadModalUpdate() {
            if (musicUploadState.modalUpdateQueued) return;
            musicUploadState.modalUpdateQueued = true;
            requestAnimationFrame(() => {
                musicUploadState.modalUpdateQueued = false;
                updateMusicUploadModal();
            });
        }

        async function handleMusicUpload(event) {
            const files = Array.from(event.target?.files || []);
            if (!files.length) return;
            musicState.uploading = true;
            musicUploadState.hiddenByUser = false;
            musicUploadState.totalFiles = files.length;
            musicUploadState.completedFiles = 0;
            musicUploadState.totalBytes = files.reduce((sum, f) => sum + (Number(f.size) || 0), 0);
            musicUploadState.completedBytes = 0;
            musicUploadState.inFlight = {};

            showMusicUploadModal();
            updateMusicUploadModal();
            updateMusicStatusLabel(`Uploading ${files.length} track${files.length > 1 ? "s" : ""}...`);

            const batchSize = 2;
            for (let i = 0; i < files.length; i += batchSize) {
                const batch = files.slice(i, i + batchSize);
                await Promise.all(batch.map((file, idx) => {
                    const key = `${i + idx}:${file.name}`;
                    return uploadMusicFile(file, {
                        onProgress: (loaded) => {
                            musicUploadState.inFlight[key] = loaded;
                            queueMusicUploadModalUpdate();
                        },
                        onComplete: () => {
                            musicUploadState.completedFiles += 1;
                            musicUploadState.completedBytes += Number(file.size) || 0;
                            delete musicUploadState.inFlight[key];
                            queueMusicUploadModalUpdate();
                        }
                    });
                }));
                // Yield between batches so playback/UI remains responsive.
                await new Promise(resolve => setTimeout(resolve, 0));
            }

            musicState.uploading = false;
            updateMusicUploadModal();
            lucide.createIcons();
            setTimeout(() => {
                hideMusicUploadModal();
            }, 900);
            event.target.value = "";
            updateMusicStatusLabel(`${musicState.tracks.length} track${musicState.tracks.length === 1 ? "" : "s"} ready`);
        }

        function uploadMusicFile(file, hooks = {}) {
            return new Promise(resolve => {
                const xhr = new XMLHttpRequest();
                const docParam = encodeURIComponent(musicState.docName || current || "global");
                xhr.open("POST", `/upload_file?doc=${docParam}`, true);
                xhr.upload.onprogress = function (evt) {
                    if (!evt.lengthComputable) return;
                    hooks.onProgress?.(evt.loaded, evt.total);
                };
                xhr.onload = function () {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            const payload = JSON.parse(xhr.responseText);
                            addMusicTrack(payload, { autoplay: false });
                        } catch (e) {
                            updateMusicStatusLabel("Upload failed");
                        }
                    } else {
                        updateMusicStatusLabel("Upload failed");
                    }
                    hooks.onComplete?.();
                    resolve();
                };
                xhr.onerror = function () {
                    updateMusicStatusLabel("Upload failed");
                    hooks.onComplete?.();
                    resolve();
                };
                const formData = new FormData();
                formData.append("file", file);
                xhr.send(formData);
            });
        }

        function addMusicTrack(info, options = {}) {

        function toggleMusicPlay(id) {
            const track = musicState.tracks.find(t => t.id === id);
            if (!track) return;
            if (musicState.currentId === id && window.gmpAudio && !window.gmpAudio.paused) {
                pauseMusicTrack(track);

        function playMusicTrack(track) {
            if (!track || !window.gmpAudio) return;
            const gmpEl = document.getElementById('globalMusicPlayer');

            // Push the currentId to history stack before playing the new track
            if (track.id) {
                if (!isHistoryNavigation && musicState.currentId && musicState.currentId !== track.id) {
                    if (globalPlayerHistory.length === 0 || globalPlayerHistory[globalPlayerHistory.length - 1] !== musicState.currentId) {
                        globalPlayerHistory.push(musicState.currentId);
                    }
                }
            }

            if (window.globalMusicPlayerBeginTrackTransition) {
                window.globalMusicPlayerBeginTrackTransition();
            }
            musicState.currentId = track.id;

            const currentSrc = new URL(window.gmpAudio.src || window.location.href).pathname;
            const newSrc = new URL(track.url, window.location.origin).pathname;

            if (decodeURIComponent(currentSrc) !== decodeURIComponent(newSrc)) {
                window.gmpAudio.src = track.url;
                window.gmpAudio.load();
            }

            window.gmpAudio.play().catch(() => {
                updateMusicStatusLabel("Could not play track. Try again.");
            });

            musicState.tracks.forEach(t => t.card?.classList.remove("is-playing"));
            track.card?.classList.add("is-playing");

            // Scroll the music list horizontally to the active card without forcing vertical page scroll
            // Avoid scrolling the underlying main page container when the music player is in fullscreen mode to prevent vertical page shift
            if (track.card && !gmpEl.classList.contains('is-fullscreen')) {
                const container = track.card.parentElement;
                if (container) {
                    const scrollTarget = track.card.offsetLeft - (container.clientWidth / 2) + (track.card.clientWidth / 2);
                    container.scrollTo({
                        left: scrollTarget,
                        behavior: 'smooth'
                    });
                }
            }

            updateMusicButtons();
            updateMusicGlobalIndicator();
            if (window.updateGlobalPlayerUI) window.updateGlobalPlayerUI();
            if (window.globalMusicPlayerEndTrackTransition) {
                window.globalMusicPlayerEndTrackTransition();
            }
        }

        function handleMusicDownloads(tracks) {
            if (!tracks || tracks.length === 0) {
                updateMusicStatusLabel("No tracks to download");
                return;
            }
            if (musicState.downloading) return;
            musicState.downloading = true;
            const total = tracks.length;
            const fill = document.getElementById("musicProgressFill");
            const label = document.getElementById("musicProgressLabel");
            if (fill) fill.style.width = "0%";
            
            let timerInterval;
            
            const run = async () => {
                if (total > 1) {
                    const BATCH_SIZE = 20;
                    const chunks = [];
                    for (let i = 0; i < tracks.length; i += BATCH_SIZE) {
                        chunks.push(tracks.slice(i, i + BATCH_SIZE));
                    }
                    
                    const formatTimeRemaining = (ms) => {
                        if (ms <= 0) return "";
                        const totalSeconds = Math.round(ms / 1000);
                        const minutes = Math.floor(totalSeconds / 60);
                        const seconds = totalSeconds % 60;
                        if (minutes > 0) {
                            return ` (~${minutes}m ${seconds}s remaining)`;
                        }
                        return ` (~${seconds}s remaining)`;
                    };
                    
                    const startTime = Date.now();
                    let currentBatchIndex = 0;
                    
                    const updateStatusLabel = () => {
                        if (!label) return;
                        const elapsed = Date.now() - startTime;
                        let etaStr = "";
                        if (currentBatchIndex > 0) {
                            const avgTime = elapsed / currentBatchIndex;
                            const remaining = chunks.length - currentBatchIndex;
                            etaStr = formatTimeRemaining(avgTime * remaining);
                        } else {
                            const elapsedSec = Math.round(elapsed / 1000);
                            etaStr = ` (elapsed: ${elapsedSec}s)`;
                        }
                        label.textContent = `Creating zip archive ${currentBatchIndex + 1} of ${chunks.length}...${etaStr}`;
                    };
                    
                    timerInterval = setInterval(updateStatusLabel, 1000);
                    
                    for (let i = 0; i < chunks.length; i++) {
                        const chunk = chunks[i];
                        currentBatchIndex = i;
                        updateStatusLabel();
                        
                        const progressStart = (i / chunks.length) * 100;
                        const progressMid = ((i + 0.9) / chunks.length) * 100;
                        const progressEnd = ((i + 1) / chunks.length) * 100;
                        
                        if (fill) fill.style.width = `${progressStart}%`;
                        
                        const response = await fetch("/download_music", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ track_ids: chunk.map(t => t.id) })
                        });
                        
                        if (!response.ok) {
                            throw new Error(`Failed to create zip part ${i + 1}`);
                        }
                        
                        if (fill) fill.style.width = `${progressMid}%`;
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const anchor = document.createElement("a");
                        anchor.href = url;
                        const docName = (musicState.docName || "music").replace(/[^a-zA-Z0-9-_]/g, "_");
                        anchor.download = chunks.length === 1 ? `${docName}_tracks.zip` : `${docName}_tracks_part${i + 1}.zip`;
                        document.body.appendChild(anchor);
                        anchor.click();
                        document.body.removeChild(anchor);
                        window.URL.revokeObjectURL(url);
                        
                        chunk.forEach(track => updateTrackStatus(track, "Downloaded"));
                        if (fill) fill.style.width = `${progressEnd}%`;
                        
                        if (i < chunks.length - 1) {
                            await new Promise(resolve => setTimeout(resolve, 1000));
                        }
                    }
                    if (timerInterval) clearInterval(timerInterval);
                    if (label) label.textContent = "Download complete";
                } else {
                    const track = tracks[0];
                    if (label) label.textContent = `Downloading 0 / 1`;
                    if (fill) fill.style.width = "50%";
                    await triggerTrackDownload(track);
                    if (fill) fill.style.width = "100%";
                    if (label) label.textContent = "Download complete";
                }
            };
            run()
                .catch(() => updateMusicStatusLabel("Download failed"))
                .finally(() => {
                    if (timerInterval) clearInterval(timerInterval);
                    musicState.downloading = false;
                    setTimeout(updateMusicGlobalIndicator, 800);
                });
        }

        function triggerTrackDownload(track) {
            return new Promise(resolve => {
                const anchor = document.createElement("a");
                anchor.href = track.downloadUrl || track.url;
                anchor.download = track.displayName || track.name;
                document.body.appendChild(anchor);
                anchor.click();
                document.body.removeChild(anchor);
                updateTrackStatus(track, "Download started");
                setTimeout(() => {
                    updateTrackStatus(track, "Downloaded");
                    resolve();
                }, 400);
            });
        }

            musicState.tracks = musicState.tracks.filter(track => track.id !== id);
            musicState.selectedIds.delete(id);
            if (musicState.currentId === id) {

        function deleteMusicTrack(id, options = {}) {
            if (options.skipServer) {
                removeTrackFromState(id);
                return Promise.resolve();

            return fetch(`/music_tracks/${id}`, { method: "DELETE" })
                .then(res => {
                    if (!res.ok) throw new Error("delete failed");
                    removeTrackFromState(id);
                })
                .catch(() => updateMusicStatusLabel("Could not delete track"));
        }

            const currentId = refId || musicState.currentId;
            let idx = musicState.tracks.findIndex(track => track.id === currentId);
            if (idx === -1) {
                idx = musicState.tracks.findIndex(track => track.id === musicState.currentId);
            }
            const nextIdx = (idx >= 0 && idx + 1 < musicState.tracks.length) ? idx + 1 : -1;
            if (nextIdx >= 0) {

        /* Markdown Detection */
        paper.addEventListener("keydown", e => {
            if (!markdownMode || (e.key !== " " && e.key !== "Enter")) return;

            const sel = window.getSelection();
            const node = sel.anchorNode;
            if (!node || node.nodeType !== 3) return;

            const text = node.textContent;
            const match = text.match(/^(#{1,3})\s$/);

            if (match) {
                e.preventDefault();
                const level = match[1].length;
                document.execCommand("selectAll", false);
                document.execCommand("delete", false);
                document.execCommand("formatBlock", false, "h" + level);
            }
        });

            if (e.target === paper) {
                article.focus();
                // Move cursor to end
                const range = document.createRange();
                range.selectNodeContents(article);
                range.collapse(false);
                const sel = window.getSelection();

        /* Shortcuts */
        document.addEventListener("keydown", e => {
            const k = e.key.toLowerCase();
            const mod = e.ctrlKey || e.metaKey;

            if (!mod) return;

            switch (k) {
                case "n":
                    e.preventDefault();
                    newDoc();
                    break;

                case "s":
                    e.preventDefault();
                    if (e.shiftKey) saveServer();
                    else downloadDoc();
                    break;

                case "o":

                    openServerList();
                    break;

                case "f":
                    e.preventDefault();
                    document.getElementById("findTxt").focus();

                case "h":

                    document.getElementById("replaceTxt").focus();

                case "m":
                    e.preventDefault();

            if (savedTheme) {
                html.classList.add('theme-manual');
                const isDark = savedTheme === 'dark';
                document.body.classList.add(isDark ? 'dark-mode' : 'light-mode');
                html.classList.add(isDark ? 'dark-mode' : 'light-mode');
            } else {
                // Follow system theme automatically
                const isSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.body.classList.add(isSystemDark ? 'dark-mode' : 'light-mode');
                html.classList.add(isSystemDark ? 'dark-mode' : 'light-mode');
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (localStorage.getItem('theme')) return;
                    document.body.classList.toggle('dark-mode', e.matches);
                    document.body.classList.toggle('light-mode', !e.matches);
                    html.classList.toggle('dark-mode', e.matches);
                    html.classList.toggle('light-mode', !e.matches);
                    updateThemeColorMeta();

                    // Re-adapt dynamic music player colors for light/dark mode
                    const track = musicState.tracks.find(t => t.id === musicState.currentId);
                    if (track && track.extractedColors) {
                        applyArtworkColors(track.extractedColors);
                    }
                });
            }
            updateThemeColorMeta();

            // Restore Background
            if (localStorage.getItem('hide-bg') === 'true') {
                document.body.classList.add('hide-bg');
                document.body.classList.add('full-screen-active');
            }

            // Fetch doc list from backend and open last opened doc only
            (async function () {
                try {
                    const lRes = await fetch('/list');
                    const files = await lRes.json();
                    if (files.length > 0) {
                        // Build docs map from server list
                        docs = {};
                        files.forEach(f => { docs[f] = null; });
                        closedDocs = closedDocs.filter(d => docs[d] !== undefined);
                        saveClosedDocs();

                        // Only open if user previously had a doc open
                        const stored = localStorage.getItem("currentDoc");
                        if (stored && docs[stored] !== undefined && !isClosedDoc(stored)) {
                            current = stored;
                            renderTabs();
                            await openDoc(current);
                        } else {
                            current = null;
                            renderTabs();
                            article.innerHTML = "";
                            article.contentEditable = "false";
                            status.textContent = "Ready";
                        }
                    } else {
                        closedDocs = [];
                        saveClosedDocs();
                        current = null;
                        localStorage.removeItem("currentDoc");
                        article.innerHTML = "";
                        article.contentEditable = "false";
                        renderTabs();
                        status.textContent = "Ready";
                    }
                } catch (e) {
                    article.innerHTML = "";
                    status.textContent = "Ready: No document";
                }
                lucide.createIcons();
                syncWithServer();
            })();
        };

        async function syncWithServer() {
            if (isSyncing) return;
            isSyncing = true;

            try {
                const res = await fetch("/last_modified");
                const m = await res.json();

                if (m.last_mod !== lastSyncTime) {
                    const lRes = await fetch("/list");
                    let files = await lRes.json();

                    // Remove docs no longer on server
                    Object.keys(docs).forEach(d => {
                        if (!files.includes(d)) delete docs[d];
                    });

                    // Add new files as null (unloaded)
                    files.forEach(f => {
                        if (!docs[f]) docs[f] = null;
                    });

                    // Clean up closed docs that no longer exist
                    closedDocs = closedDocs.filter(d => docs[d] !== undefined);
                    saveClosedDocs();

                    // Fetch and display content for current doc if not loaded
                    if (current && (docs[current] === null || docs[current] === undefined)) {
                        try {
                            const res = await fetch("/open", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ name: current })
                            });
                            if (res.ok) {
                                const data = await res.json();
                                docs[current] = data.content || "";
                                article.innerHTML = docs[current];
                                syncPdfShelfFromArticle();
                                syncEpubShelfFromArticle();
                            }
                        } catch (e) {
                            article.innerHTML = "";
                        }
                    } else if (current && docs[current] !== undefined) {
                        article.innerHTML = docs[current];
                        syncPdfShelfFromArticle();
                        syncEpubShelfFromArticle();
                    }

                    renderTabs();
                    lastSyncTime = m.last_mod;
                    localStorage.setItem("docs", JSON.stringify(docs));
                }
            } catch (e) {
                console.error("Sync error:", e);
            } finally {
                isSyncing = false;
                setTimeout(syncWithServer, 10000);
            }
        }

        function initVideoControls() {
            // Initialize resizers
            document.querySelectorAll('.resizer').forEach(resizer => {
                if (resizer.dataset.handled) return;
                const container = resizer.parentElement;

                let startX, startWidth;

                const startResize = (e) => {
                    const point = e.type === 'touchstart' ? e.touches[0] : e;
                    startX = point.clientX;
                    startWidth = container.offsetWidth;

                    document.body.classList.add('resizing');
                    paper.style.pointerEvents = "none";

                    const resizing = (ev) => {
                        if (ev.type === 'touchmove') ev.preventDefault();
                        const p = ev.type === 'touchmove' ? ev.touches[0] : ev;
                        const diff = p.clientX - startX;
                        container.style.width = (startWidth + diff) + 'px';
                    };

                    const endResize = () => {
                        document.body.classList.remove('resizing');
                        paper.style.pointerEvents = "auto";
                        window.removeEventListener('mousemove', resizing, { capture: true });
                        window.removeEventListener('mouseup', endResize, { capture: true });
                        window.removeEventListener('touchmove', resizing, { capture: true });
                        window.removeEventListener('touchend', endResize, { capture: true });

                        // Sync new size to server
                        saveServer();
                    };

                    window.addEventListener('mousemove', resizing, { capture: true });
                    window.addEventListener('mouseup', endResize, { capture: true });
                    window.addEventListener('touchmove', resizing, { capture: true, passive: false });
                    window.addEventListener('touchend', endResize, { capture: true });
                };

                resizer.addEventListener('mousedown', startResize);
                resizer.addEventListener('touchstart', startResize);
                resizer.dataset.handled = "true";
            });

            // Initialize movers
            document.querySelectorAll('.mover').forEach(mover => {
                if (mover.dataset.handled) return;
                const container = mover.parentElement;

                let startX, startY, startLeft, startTop;

                const startMove = (e) => {
                    e.preventDefault();
                    const point = e.type === 'touchstart' ? e.touches[0] : e;
                    startX = point.clientX;
                    startY = point.clientY;

                    // Switch to absolute if not already
                    if (window.getComputedStyle(container).position !== 'absolute') {
                        const rect = container.getBoundingClientRect();
                        const paperRect = paper.getBoundingClientRect();
                        container.style.position = 'absolute';
                        container.style.left = (rect.left - paperRect.left) + 'px';
                        container.style.top = (rect.top - paperRect.top + paper.scrollTop) + 'px';
                        container.style.margin = '0';
                    }

                    startLeft = parseFloat(container.style.left) || 0;
                    startTop = parseFloat(container.style.top) || 0;

                    container.classList.add('dragging');
                    document.body.classList.add('resizing'); // Shield
                    paper.style.pointerEvents = "none";

                    const moving = (ev) => {
                        if (ev.type === 'touchmove') ev.preventDefault();
                        const p = ev.type === 'touchmove' ? ev.touches[0] : ev;
                        const dx = p.clientX - startX;
                        const dy = p.clientY - startY;
                        container.style.left = (startLeft + dx) + 'px';
                        container.style.top = (startTop + dy) + 'px';
                    };

                    const endMove = () => {
                        container.classList.remove('dragging');
                        document.body.classList.remove('resizing');
                        paper.style.pointerEvents = "auto";
                        window.removeEventListener('mousemove', moving, { capture: true });
                        window.removeEventListener('mouseup', endMove, { capture: true });
                        window.removeEventListener('touchmove', moving, { capture: true });
                        window.removeEventListener('touchend', endMove, { capture: true });

                        // Sync new position to server
                        saveServer();
                    };

                    window.addEventListener('mousemove', moving, { capture: true });
                    window.addEventListener('mouseup', endMove, { capture: true });
                    window.addEventListener('touchmove', moving, { capture: true, passive: false });
                    window.addEventListener('touchend', endMove, { capture: true });
                };

                mover.addEventListener('mousedown', startMove);
                mover.addEventListener('touchstart', startMove);
                mover.dataset.handled = "true";
            });
        }
